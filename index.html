<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- SECURITY: meta-level CSP is a belt-and-braces companion to the Vercel
       response headers. Allowing 'unsafe-inline' and 'unsafe-eval' for scripts
       is a regrettable concession to the Tailwind CDN runtime; everything
       else is allow-listed. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>GRCentral</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Montserrat', 'system-ui', 'sans-serif'] },
          colors: {
            ink:    { 950: '#000000', 900: '#070707', 800: '#0d0d0f', 700: '#15151a', 600: '#1d1d24', 500: '#26262f' },
            babcom: { DEFAULT: '#ff5a1f', 50: '#fff3ec', 100: '#ffe1d1', 200: '#ffc3a3', 300: '#ff9c6b', 400: '#ff7a3d', 500: '#ff5a1f', 600: '#e84610', 700: '#bf350a', 800: '#962a0a', 900: '#7a230b' },
            accent: { cyan: '#22d3ee', violet: '#a78bfa', emerald: '#34d399', amber: '#fbbf24', rose: '#fb7185' }
          }
        }
      }
    };
  </script>
</head>
<body class="bg-ink-950 text-white font-sans antialiased">

  <!-- Loading splash -->
  <div id="splash" class="fixed inset-0 z-[100] flex items-center justify-center bg-ink-950">
    <div class="text-center">
      <div class="mx-auto mb-5 h-14 w-14 rounded-2xl bg-gradient-to-br from-babcom-500 to-babcom-700 flex items-center justify-center shadow-[0_0_60px_rgba(255,90,31,0.45)]">
        <span class="font-black text-2xl tracking-tight">GR</span>
      </div>
      <div class="font-extrabold text-xl tracking-tight mb-3">GRCentral</div>
      <img src="assets/img/babcom-logo.png" alt="babcom" class="h-4 w-auto mx-auto opacity-90" />
      <div class="text-xs uppercase tracking-[0.4em] text-white/40 mt-5">Loading…</div>
    </div>
  </div>

  <!-- App shell -->
  <div id="app" class="hidden min-h-screen grid" style="grid-template-columns: 260px 1fr;">

    <!-- Sidebar -->
    <aside class="border-r border-white/5 bg-ink-900/80 backdrop-blur-xl sticky top-0 h-screen flex flex-col">
      <div class="px-5 py-5 border-b border-white/5">
        <div class="flex items-center gap-3">
          <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-babcom-500 to-babcom-700 flex items-center justify-center shadow-[0_0_30px_rgba(255,90,31,0.35)] flex-shrink-0">
            <span class="font-black text-lg">GR</span>
          </div>
          <div class="min-w-0">
            <div class="font-extrabold tracking-tight text-[15px] leading-none">GRCentral</div>
            <div class="mt-1.5 flex items-center gap-1.5">
              <span class="text-[9px] uppercase tracking-[0.22em] text-white/35">by</span>
              <img src="assets/img/babcom-logo.png" alt="babcom" class="h-3 w-auto opacity-85" />
            </div>
          </div>
        </div>
      </div>

      <nav id="nav" class="flex-1 overflow-y-auto px-3 py-4 space-y-1 text-sm"></nav>

      <div class="px-3 pb-4">
        <div class="rounded-xl border border-white/5 bg-ink-800/60 p-3">
          <div class="flex items-center gap-2 mb-2">
            <i data-lucide="radio" class="w-3.5 h-3.5 text-accent-emerald"></i>
            <span class="text-[11px] uppercase tracking-widest text-white/50">Live feeds</span>
          </div>
          <div class="text-xs text-white/70">10 sources, last sync <span id="lastSync">just now</span></div>
          <button id="syncNow" class="mt-2 w-full text-[11px] uppercase tracking-wider py-2 rounded-lg bg-babcom-500/10 text-babcom-300 hover:bg-babcom-500/20 transition">Sync now</button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="min-w-0">
      <!-- Topbar -->
      <header class="sticky top-0 z-30 bg-ink-950/80 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-4 px-6 py-3">
          <div class="flex items-center gap-2 text-xs text-white/50">
            <span id="crumb-section">Dashboard</span>
            <i data-lucide="chevron-right" class="w-3 h-3"></i>
            <span id="crumb-page" class="text-white/80">Overview</span>
          </div>
          <div class="flex-1">
            <div class="relative max-w-md ml-auto">
              <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-white/40"></i>
              <input id="globalSearch" placeholder="Search regulations, controls, articles…" class="w-full pl-9 pr-3 py-2 rounded-lg bg-ink-800 border border-white/5 text-sm placeholder:text-white/30 focus:outline-none focus:border-babcom-500/40" />
            </div>
          </div>
          <button class="relative p-2 rounded-lg hover:bg-white/5">
            <i data-lucide="bell" class="w-4 h-4"></i>
            <span class="absolute top-1.5 right-1.5 h-1.5 w-1.5 bg-babcom-500 rounded-full"></span>
          </button>
          <div id="personaSwitcher" class="flex items-center gap-2 pl-3 border-l border-white/5"></div>
        </div>
      </header>

      <!-- Page content -->
      <section id="view" class="p-6 max-w-[1400px] mx-auto"></section>

      <footer class="px-6 py-6 text-[11px] text-white/30 text-center border-t border-white/5 mt-8">
        GRCentral · prototype · powered by EUR-Lex · EDPB · ENISA · NIST · CISA · CERT-In · ICO · OWASP · CIS
      </footer>
    </main>
  </div>

  <!-- Modal root -->
  <div id="modalRoot"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/risk-engine.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/views.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
